# SPDX-License-Identifier: Apache-2.0
name: "Build & Publish JSON-RPC Relay Image"

on:
  push:
    branches: [testnet]
    tags: ["goliath-testnet-*"]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        default: "linux/amd64"
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/json-rpc-relay

jobs:
  build-and-publish:
    name: Build & Publish Relay Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Commit Timestamp
        id: commit
        run: echo "source-date=$(git log -1 --pretty=%ct)" >> "${GITHUB_OUTPUT}"

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},prefix=
            type=match,pattern=goliath-testnet-(.*),group=1
            type=sha,prefix=

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          platforms: ${{ inputs.platforms || 'linux/amd64' }}
          build-args: |
            SOURCE_DATE_EPOCH=${{ steps.commit.outputs.source-date }}
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make Package Public
        if: github.event_name == 'push'
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /orgs/${{ github.repository_owner }}/packages/container/hiero-json-rpc-relay%2Fjson-rpc-relay/visibility \
            -f visibility=public 2>/dev/null || echo "Note: Set package visibility to public manually in GitHub Settings > Packages"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
